name: Winget Update Check

on:
  workflow_dispatch:

  schedule:
    - cron: '0 2 * * 0'

permissions:
  contents: write

jobs:

  winget-update-check:
    if: github.actor != 'github-actions[bot]'
    
    runs-on: [self-hosted, windows, intune-test]

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Verify Git
        shell: pwsh
        run: |
            git --version

      - name: Run Winget Update Check
        shell: pwsh
        run: |
          ./scripts/Update-WingetApps.ps1