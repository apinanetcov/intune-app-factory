name: Intune App Factory

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: "App folder name under apps/ (e.g. GoogleChrome)"
        required: true
        default: "GoogleChrome"
  push:
    branches: [main]
    paths:
      - "apps/**"
    
jobs:
  build:
    name: Build .intunewin package
    runs-on: [self-hosted, windows, intune-test]
    outputs:
      app_name: ${{ steps.setvars.outputs.app_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine app name
        id: setvars
        shell: pwsh
        run: |
          $appName = "${{ github.event.inputs.app_name }}"

          # Manual workflow_dispatch
          if (-not $appName) {
              $commitMessage = "${{ github.event.head_commit.message }}"
              
              if ($commitMessage -match '\[app:(.+?)\]') {
                  $appName = $matches[1]
              }
          }

          # Fallback for PR merges and automated updates
          if (-not $appName)
          {
              Write-Host "Attempting to determine app from changed files..."
              $changedFiles = git diff-tree --no-commit-id --name-only -r $env:GITHUB_SHA
              $apps = $changedFiles |
                  Where-Object { $_ -like 'apps/*' } |
                  ForEach-Object {($_ -split '/')[1]} |
                  Select-Object -Unique

              if ($apps.Count -eq 1) {
                  $appName = $apps[0]
              }
              elseif ($apps.Count -gt 1) {
                  Write-Error "Multiple applications modified in one commit: $($apps -join ', ')""
              }
          }
          if (-not $appName) {
              Write-Error "App name not provided. Use workflow_dispatch input or commit message [app:AppName]"
          }
          Write-Host "Using app name: $appName"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "app_name=$appName"

      - name: Build package
        shell: pwsh
        run: ./scripts/Build-IntuneWinPackage.ps1 `
            -AppName "${{ steps.setvars.outputs.app_name }}" `
            -TenantId "${{ secrets.AZURE_TENANT_ID }}" `
            -PnPClientId "${{ secrets.PNP_CLIENT_ID }}" `
            -PnPCertificate "${{ secrets.PNP_CERT_LOCAL }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: intunewin-package-${{ steps.setvars.outputs.app_name }}
          path: build/${{ steps.setvars.outputs.app_name }}/output/*
          retention-days: 5

  test:
    name: Test on apptest-win11
    needs: build
    runs-on: [self-hosted, windows, intune-test]
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: intunewin-package-${{ needs.build.outputs.app_name }}
          path: artifact

      - name: Run install/uninstall test
        shell: pwsh
        run: ./scripts/Test-AppPackage-v3.ps1 -AppName "${{ needs.build.outputs.app_name }}" -ArtifactFolder "artifact"

  publish:
    name: Publish to Intune
    needs: [build, test]
    runs-on: windows-latest
    environment: production   # manual approval gate configured in repo settings
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: intunewin-package-${{ needs.build.outputs.app_name }}
          path: artifact

      - name: Publish to Intune
        shell: pwsh
        run: |
          ./scripts/Publish-IntuneApp-v2.ps1 `
            -AppName "${{ needs.build.outputs.app_name }}" `
            -ArtifactFolder "artifact" `
            -TenantId "${{ secrets.AZURE_TENANT_ID }}" `
            -ClientId "${{ secrets.AZURE_CLIENT_ID }}" `
            -ClientSecret "${{ secrets.AZURE_CLIENT_SECRET }}"