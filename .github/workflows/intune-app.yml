name: Intune App Factory

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: "App folder name under apps/ (e.g. GoogleChrome)"
        required: true
        default: "GoogleChrome"
  push:
    branches: [main]
    paths:
      - "apps/**"

jobs:
  build:
    name: Build .intunewin package
    runs-on: [self-hosted, windows, intune-test]
    outputs:
      app_name: ${{ steps.setvars.outputs.app_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine app name
        id: setvars
        uses: actions/github-script@v7
        with:
          script: |
            const appName = "${{ github.event.inputs.app_name }}";
            
            if (!appName) {
              const { data: commits } = await github.rest.repos.compareCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                base: context.payload.pull_request?.base.sha || '${{ github.event.before }}',
                head: context.payload.pull_request?.head.sha || '${{ github.sha }}'
              });
              
              const changedFiles = commits.flatMap(c => c.files.map(f => f.filename));
              const appJsonMatch = changedFiles.find(f => f.match(/^apps\/([^/]+)\/app\.json$/));
              
              if (appJsonMatch) {
                const detected = appJsonMatch.match(/^apps\/([^/]+)\/app\.json$/)[1];
                core.setOutput("app_name", detected);
                console.log(`Deploying app: ${detected}`);
              } else {
                core.setFailed("No app.json file was added or edited. Workflow will not proceed.");
              }
            } else {
              core.setOutput("app_name", appName);
              console.log(`Deploying app: ${appName}`);
            }

      - name: Build package
        shell: pwsh
        run: ./scripts/Build-IntuneWinPackage.ps1 `
            -AppName "${{ steps.setvars.outputs.app_name }}" `
            -TenantId "${{ secrets.AZURE_TENANT_ID }}" `
            -PnPClientId "${{ secrets.PNP_CLIENT_ID }}" `
            -PnPCertificate "${{ secrets.PNP_CERT_LOCAL }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: intunewin-package-${{ steps.setvars.outputs.app_name }}
          path: build/${{ steps.setvars.outputs.app_name }}/output/*
          retention-days: 5

  test:
    name: Test on apptest-win11
    needs: build
    runs-on: [self-hosted, windows, intune-test]
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: intunewin-package-${{ needs.build.outputs.app_name }}
          path: artifact

      - name: Run install/uninstall test
        shell: pwsh
        run: ./scripts/Test-AppPackage.ps1 -AppName "${{ needs.build.outputs.app_name }}" -ArtifactFolder "artifact"

  publish:
    name: Publish to Intune
    needs: [build, test]
    runs-on: windows-latest
    environment: production   # manual approval gate configured in repo settings
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: intunewin-package-${{ needs.build.outputs.app_name }}
          path: artifact

      - name: Publish to Intune
        shell: pwsh
        run: |
          ./scripts/Publish-IntuneApp.ps1 `
            -AppName "${{ needs.build.outputs.app_name }}" `
            -ArtifactFolder "artifact" `
            -TenantId "${{ secrets.AZURE_TENANT_ID }}" `
            -ClientId "${{ secrets.AZURE_CLIENT_ID }}" `
            -ClientSecret "${{ secrets.AZURE_CLIENT_SECRET }}"