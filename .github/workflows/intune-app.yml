name: Intune App Factory

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: "App folder name under apps/ (e.g. GoogleChrome)"
        required: true
        default: "GoogleChrome"
  push:
    branches: [main]
    paths:
      - "apps/**"

jobs:
  build:
    name: Build .intunewin package
    runs-on: windows-latest
    outputs:
      app_name: ${{ steps.setvars.outputs.app_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine app name
        id: setvars
        shell: pwsh
        run: |
          $appName = "${{ github.event.inputs.app_name }}"
          
          # If triggered by push (not workflow_dispatch), detect changed app folder
          if ([string]::IsNullOrEmpty($appName)) {
            $changedFiles = @("${{ github.event.head_commit.modified }}" -split ',')
            $appFolders = @()
            
            foreach ($file in $changedFiles) {
              if ($file -match "^apps/([^/]+)/") {
                $appFolders += $matches[1]
              }
            }
            
            if ($appFolders.Count -gt 0) {
              $appName = $appFolders[0]  # Use first changed app
            } else {
              $appName = "GoogleChrome"  # Fallback default
            }
          }
          
          Write-Host "Deploying app: $appName"
          echo "app_name=$appName" >> $env:GITHUB_OUTPUT

      - name: Build package
        shell: pwsh
        run: ./scripts/Build-IntuneWinPackage.ps1 `
            -AppName "${{ steps.setvars.outputs.app_name }}" `
            -SharePointUser "${{ secrets.SHAREPOINT_USER }}" `
            -SharePointPassword "${{ secrets.SHAREPOINT_PASSWORD }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: intunewin-package-${{ steps.setvars.outputs.app_name }}
          path: build/${{ steps.setvars.outputs.app_name }}/output/*
          retention-days: 5

  test:
    name: Test on apptest-win11
    needs: build
    runs-on: [self-hosted, windows, intune-test]
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: intunewin-package-${{ needs.build.outputs.app_name }}
          path: artifact

      - name: Run install/uninstall test
        shell: pwsh
        run: ./scripts/Test-AppPackage.ps1 -AppName "${{ needs.build.outputs.app_name }}" -ArtifactFolder "artifact"

  publish:
    name: Publish to Intune
    needs: [build, test]
    runs-on: windows-latest
    environment: production   # manual approval gate configured in repo settings
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: intunewin-package-${{ needs.build.outputs.app_name }}
          path: artifact

      - name: Publish to Intune
        shell: pwsh
        run: |
          ./scripts/Publish-IntuneApp.ps1 `
            -AppName "${{ needs.build.outputs.app_name }}" `
            -ArtifactFolder "artifact" `
            -TenantId "${{ secrets.AZURE_TENANT_ID }}" `
            -ClientId "${{ secrets.AZURE_CLIENT_ID }}" `
            -ClientSecret "${{ secrets.AZURE_CLIENT_SECRET }}" `
            -SharePointUser "${{ secrets.SHAREPOINT_USER }}" `
            -SharePointPassword "${{ secrets.SHAREPOINT_PASSWORD }}"