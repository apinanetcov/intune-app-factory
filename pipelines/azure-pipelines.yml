trigger:
  - main

pool:
  vmImage: "windows-latest"

variables:
  appPath: "apps/7zip"

stages:
  - stage: Package
    jobs:
      - job: Package
        steps:
          - checkout: self

          - powershell: |
              ./scripts/package.ps1 -AppPath $(appPath)

  - stage: Test
    dependsOn: Package
    jobs:
      - job: TestApp
        steps:
          - powershell: |
              ./scripts/test-install.ps1 -AppPath $(appPath)

  # Optional Terraform stage
  - stage: ProvisionVM
    dependsOn: Package
    jobs:
      - job: Terraform
        steps:
          - script: |
              cd terraform/test-vm
              terraform init
              terraform apply -auto-approve

  - stage: Deploy
    dependsOn: Test
    jobs:
      - job: DeployIntune
        steps:
          - powershell: |
              ./scripts/deploy-intune.ps1 -AppPath $(appPath)
